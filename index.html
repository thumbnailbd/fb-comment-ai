<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Comment AI – বাংলা অটো রিপ্লাই</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0a0a0f; color: #e8e8f0; font-family: 'Hind Siliguri', sans-serif; }
    input, textarea, button { font-family: 'Hind Siliguri', sans-serif; }
    input::placeholder, textarea::placeholder { color: #3a3a5a; }
    input:focus, textarea:focus { border-color: #7c3aed !important; outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    button { cursor: pointer; transition: opacity 0.15s; }
    button:hover:not(:disabled) { opacity: 0.88; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef } = React;
  const GRAPH = "https://graph.facebook.com/v19.0";
  const SYSTEM = `তুমি একজন বাংলাদেশী এন্টারটেইনমেন্ট কনটেন্ট ক্রিয়েটরের পেজ ম্যানেজার। দর্শকদের কমেন্টের যথাযথ বাংলা রিপ্লাই দাও।
নিয়ম: বন্ধুত্বপূর্ণ ও আন্তরিক টোনে লিখবে। প্রশংসায় কৃতজ্ঞতা জানাবে। প্রশ্নের উত্তর দেবে। নেগেটিভ কমেন্টে ধৈর্য ধরে রিপ্লাই দেবে। মাঝে মাঝে ইমোজি ব্যবহার করবে। রিপ্লাই ১-৩ লাইনের মধ্যে রাখবে। শুধু রিপ্লাই টেক্সটটাই দাও।`;

  function App() {
    const getInitStep = () => {
      try {
        const t = localStorage.getItem("fb_token");
        if (t) return 2;
      } catch(e) {}
      return 1;
    };

    const [step, setStep] = useState(getInitStep);
    const [token, setToken] = useState(() => { try { return localStorage.getItem("fb_token") || ""; } catch(e) { return ""; } });
    const [pageName, setPageName] = useState(() => { try { return localStorage.getItem("fb_page") || ""; } catch(e) { return ""; } });
    const [postId, setPostId] = useState("");
    const [comments, setComments] = useState([]);
    const [loading, setLoading] = useState(false);
    const [genLoading, setGenLoading] = useState({});
    const [sendLoading, setSendLoading] = useState({});
    const [editMap, setEditMap] = useState({});
    const [sentIds, setSentIds] = useState(new Set());
    const [error, setError] = useState("");
    const [success, setSuccess] = useState("");

    const tokenRef = useRef(""); tokenRef.current = token;

    const showErr = (m) => { setError(m); setTimeout(() => setError(""), 5000); };
    const showOk  = (m) => { setSuccess(m); setTimeout(() => setSuccess(""), 3000); };

    const validateToken = async () => {
      if (!token.trim()) return showErr("Facebook Token দাও আগে!");
      setLoading(true);
      try {
        const r = await fetch(`${GRAPH}/me?access_token=${token}&fields=name`);
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        setPageName(d.name);
        try { localStorage.setItem("fb_token", token); localStorage.setItem("fb_page", d.name); } catch(e) {}
        setStep(2);
      } catch(e) { showErr("Token ভুল বা মেয়াদ শেষ!"); }
      setLoading(false);
    };

    const fetchComments = async () => {
      if (!postId.trim()) return showErr("Post ID দাও!");
      setLoading(true);
      try {
        const r = await fetch(`${GRAPH}/${postId.trim()}/comments?access_token=${tokenRef.current}&fields=id,from,message,created_time&limit=50&order=chronological`);
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        if (!d.data?.length) { showErr("কোনো কমেন্ট পাওয়া যায়নি!"); setLoading(false); return; }
        setComments(d.data.map(c => ({ id: c.id, author: c.from?.name || "অজানা", message: c.message, time: c.created_time, reply: "" })));
        setStep(3);
      } catch(e) { showErr("ফেচ করতে সমস্যা: " + e.message); }
      setLoading(false);
    };

    const genReply = async (id, msg) => {
      setGenLoading(p => ({ ...p, [id]: true }));
      try {
        const r = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{
              role: "user",
              parts: [{ text: SYSTEM + "\n\nএই কমেন্টের রিপ্লাই দাও: \"" + msg + "\"" }]
            }]
          })
        });
        const data = await r.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        if (!reply) throw new Error("কোনো রিপ্লাই আসেনি");
        setComments(p => p.map(c => c.id === id ? { ...c, reply } : c));
        setEditMap(p => ({ ...p, [id]: reply }));
      } catch(e) { showErr("AI সমস্যা: " + e.message); }
      setGenLoading(p => ({ ...p, [id]: false }));
    };

    const genAll = async () => {
      for (const c of comments.filter(c => !c.reply)) await genReply(c.id, c.message);
    };

    const sendReply = async (id) => {
      const text = editMap[id] ?? comments.find(c => c.id === id)?.reply;
      if (!text?.trim()) return;
      setSendLoading(p => ({ ...p, [id]: true }));
      try {
        const r = await fetch(`${GRAPH}/${id}/comments`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, access_token: tokenRef.current })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error.message);
        setSentIds(p => new Set([...p, id]));
        showOk("✅ রিপ্লাই সফলভাবে পাঠানো হয়েছে!");
      } catch(e) { showErr("রিপ্লাই পাঠাতে সমস্যা: " + e.message); }
      setSendLoading(p => ({ ...p, [id]: false }));
    };

    const timeAgo = (iso) => {
      const d = (Date.now() - new Date(iso)) / 1000;
      if (d < 60) return "এইমাত্র";
      if (d < 3600) return `${Math.floor(d/60)} মিনিট আগে`;
      if (d < 86400) return `${Math.floor(d/3600)} ঘণ্টা আগে`;
      return `${Math.floor(d/86400)} দিন আগে`;
    };

    const INP = { width:"100%", padding:"12px 16px", background:"#0d0d1a", border:"1px solid #3a3a5a", borderRadius:10, color:"#e8e8f0", fontSize:14 };
    const CARD = { background:"#13131f", border:"1px solid #2a2a3a", borderRadius:16, padding:24 };
    const BTN = (bg) => ({ width:"100%", padding:13, border:"none", borderRadius:10, color:"#fff", fontSize:15, fontWeight:700, background: bg });

    return (
      <div style={{ minHeight:"100vh", background:"#0a0a0f" }}>
        {/* Header */}
        <div style={{ background:"linear-gradient(135deg,#1a0533,#0d1a3a)", borderBottom:"1px solid #2a2a3a", padding:"18px 24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:42, height:42, background:"linear-gradient(135deg,#7c3aed,#2563eb)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>💬</div>
            <div>
              <div style={{ fontSize:18, fontWeight:700, color:"#fff" }}>FB Comment AI</div>
              <div style={{ fontSize:12, color:"#7c6f9e" }}>বাংলা অটো-রিপ্লাই সিস্টেম</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            {step === 3 && <>
              <button onClick={() => { setStep(2); setComments([]); setSentIds(new Set()); setEditMap({}); }}
                style={{ padding:"8px 14px", background:"transparent", border:"1px solid #3a3a5a", borderRadius:8, color:"#a0a0c0", fontSize:13 }}>← নতুন পোস্ট</button>
              <button onClick={genAll}
                style={{ padding:"8px 14px", background:"linear-gradient(135deg,#7c3aed,#2563eb)", border:"none", borderRadius:8, color:"#fff", fontSize:13, fontWeight:600 }}>⚡ সব জেনারেট</button>
            </>}
            {step > 1 && <button onClick={() => { setStep(1); try { localStorage.removeItem("fb_token"); localStorage.removeItem("fb_page"); } catch(e) {} }}
              style={{ padding:"8px 12px", background:"transparent", border:"1px solid #3a3a5a", borderRadius:8, color:"#a0a0c0", fontSize:13 }}>⚙️</button>}
          </div>
        </div>

        <div style={{ maxWidth:780, margin:"0 auto", padding:"28px 20px" }}>
          {error && <div style={{ background:"#2a0f0f", border:"1px solid #7f1d1d", borderRadius:10, padding:"12px 16px", marginBottom:16, color:"#fca5a5", fontSize:14, display:"flex", justifyContent:"space-between" }}>
            <span>⚠️ {error}</span><span onClick={() => setError("")} style={{ cursor:"pointer" }}>✕</span>
          </div>}
          {success && <div style={{ background:"#0f2a1a", border:"1px solid #14532d", borderRadius:10, padding:"12px 16px", marginBottom:16, color:"#86efac", fontSize:14 }}>{success}</div>}

          {/* STEP 1: FB Token */}
          {step === 1 && (
            <div className="fade-in">
              <div style={{ textAlign:"center", marginBottom:28 }}>
                <div style={{ fontSize:42, marginBottom:8 }}>🔑</div>
                <h2 style={{ fontSize:22, fontWeight:700, color:"#fff" }}>Facebook Page Token</h2>
                <p style={{ color:"#7c6f9e", fontSize:14, marginTop:8 }}>Graph API Explorer → me/accounts থেকে নাও</p>
              </div>
              <div style={CARD}>
                <label style={{ fontSize:14, color:"#a0a0c0", display:"block", marginBottom:8 }}>Page Access Token</label>
                <input type="password" placeholder="EAAxxxxx..." value={token}
                  onChange={e => setToken(e.target.value)} onKeyDown={e => e.key === "Enter" && validateToken()} style={INP} />
                <button onClick={validateToken} disabled={loading}
                  style={{ ...BTN(loading ? "#2a2a3a" : "linear-gradient(135deg,#7c3aed,#2563eb)"), marginTop:16 }}>
                  {loading ? "চেক করছি..." : "✓ যাচাই করো"}
                </button>
              </div>
            </div>
          )}

          {/* STEP 2: Post ID */}
          {step === 2 && (
            <div className="fade-in">
              <div style={{ textAlign:"center", marginBottom:28 }}>
                <div style={{ fontSize:42, marginBottom:8 }}>🎬</div>
                <h2 style={{ fontSize:22, fontWeight:700, color:"#fff" }}>পোস্ট সিলেক্ট করো</h2>
                <p style={{ color:"#7c6f9e", fontSize:14, marginTop:8 }}>স্বাগতম <span style={{ color:"#c4b5fd", fontWeight:600 }}>{pageName}</span>!</p>
              </div>
              <div style={CARD}>
                <label style={{ fontSize:14, color:"#a0a0c0", display:"block", marginBottom:8 }}>Post / Video ID</label>
                <input placeholder="106131095095232_1300007855581938" value={postId}
                  onChange={e => setPostId(e.target.value)} onKeyDown={e => e.key === "Enter" && fetchComments()} style={INP} />
                <div style={{ marginTop:8, fontSize:12, color:"#5a5a7a" }}>
                  💡 ফরমুলা: <span style={{ color:"#7c3aed" }}>পেজ ID</span>_<span style={{ color:"#60a5fa" }}>story_fbid</span>
                </div>
                <button onClick={fetchComments} disabled={loading}
                  style={{ ...BTN(loading ? "#2a2a3a" : "linear-gradient(135deg,#7c3aed,#2563eb)"), marginTop:16 }}>
                  {loading ? "লোড করছি..." : "📥 কমেন্ট লোড করো"}
                </button>
              </div>
            </div>
          )}

          {/* STEP 3: Comments */}
          {step === 3 && (
            <div className="fade-in">
              <div style={{ marginBottom:20 }}>
                <h2 style={{ fontSize:20, fontWeight:700, color:"#fff" }}>কমেন্ট লিস্ট</h2>
                <p style={{ color:"#7c6f9e", fontSize:13, marginTop:4 }}>মোট {comments.length}টি · {sentIds.size}টি রিপ্লাই দেওয়া হয়েছে</p>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                {comments.map(c => {
                  const sent = sentIds.has(c.id);
                  const replyText = editMap[c.id] ?? c.reply;
                  return (
                    <div key={c.id} style={{ background:"#13131f", border:`1px solid ${sent ? "#14532d" : "#2a2a3a"}`, borderRadius:14, padding:18, opacity: sent ? 0.7 : 1 }}>
                      <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                        <div style={{ width:38, height:38, borderRadius:"50%", background:"linear-gradient(135deg,#7c3aed44,#2563eb44)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                          {c.author.charAt(0)}
                        </div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                            <span style={{ fontWeight:600, color:"#c4b5fd", fontSize:14 }}>{c.author}</span>
                            <span style={{ color:"#4a4a6a", fontSize:12 }}>{timeAgo(c.time)}</span>
                          </div>
                          <p style={{ color:"#c8c8e0", fontSize:14, lineHeight:1.6 }}>{c.message}</p>
                        </div>
                      </div>
                      {sent ? (
                        <div style={{ padding:"10px 14px", background:"#0f2a1a", borderRadius:10, fontSize:13, color:"#86efac" }}>✅ রিপ্লাই পাঠানো হয়েছে</div>
                      ) : replyText ? (
                        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                          <textarea value={replyText} onChange={e => setEditMap(p => ({ ...p, [c.id]: e.target.value }))}
                            style={{ ...INP, resize:"vertical", minHeight:80, lineHeight:1.6 }} />
                          <div style={{ display:"flex", gap:8 }}>
                            <button onClick={() => genReply(c.id, c.message)} disabled={genLoading[c.id]}
                              style={{ flex:1, padding:9, background:"#1a1a2e", border:"1px solid #3a3a5a", borderRadius:8, color:"#a0a0c0", fontSize:13 }}>
                              {genLoading[c.id] ? "⏳..." : "🔄 নতুন"}
                            </button>
                            <button onClick={() => sendReply(c.id)} disabled={sendLoading[c.id]}
                              style={{ flex:2, padding:9, background: sendLoading[c.id] ? "#2a2a3a" : "linear-gradient(135deg,#059669,#0284c7)", border:"none", borderRadius:8, color:"#fff", fontSize:13, fontWeight:600 }}>
                              {sendLoading[c.id] ? "পাঠাচ্ছি..." : "📤 রিপ্লাই পাঠাও"}
                            </button>
                          </div>
                        </div>
                      ) : (
                        <button onClick={() => genReply(c.id, c.message)} disabled={genLoading[c.id]}
                          style={{ width:"100%", padding:11, background:"linear-gradient(135deg,#7c3aed18,#2563eb18)", border:`1px dashed ${genLoading[c.id] ? "#3a3a5a" : "#7c3aed"}`, borderRadius:10, color: genLoading[c.id] ? "#5a5a7a" : "#c4b5fd", fontSize:14 }}>
                          {genLoading[c.id] ? "⏳ AI রিপ্লাই তৈরি করছে..." : "✨ AI রিপ্লাই জেনারেট করো"}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
